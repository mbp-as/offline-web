<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maksym PWA Demo</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Maksym PWA","short_name":"Maksym","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#2ecc71","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/25/25231.png","sizes":"512x512","type":"image/png"}]}'>
    
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .status-bar { width: 100%; padding: 12px 0; text-align: center; font-weight: bold; color: white; position: sticky; top: 0; z-index: 100; transition: 0.5s; }
        .online { background-color: #2ecc71; box-shadow: 0 2px 10px rgba(46, 204, 113, 0.3); }
        .offline { background-color: #e74c3c; box-shadow: 0 2px 10px rgba(231, 76, 60, 0.3); }

        .container { width: 90%; max-width: 400px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h3 { margin-top: 0; color: #333; font-size: 1.1rem; }
        
        .img-container { width: 100%; height: 180px; background: #e0e0e0; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .no-internet { color: #777; font-weight: bold; text-align: center; padding: 20px; }

        /* Елементи керування */
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div id="status" class="status-bar online">Перевірка зв'язку...</div>

    <div class="container">
        <div class="card">
            <h3>Зображення з мережі</h3>
            <div class="img-container" id="img-holder">
                <img src="https://picsum.photos/400/300?random=1" alt="Demo" id="main-img">
            </div>
        </div>

        <div class="card">
            <h3>Компоненти UI</h3>
            <div class="row">
                <span>Авіарежим (імітація)</span>
                <label class="switch">
                    <input type="checkbox" id="mock-switch">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="row" style="flex-direction: column; align-items: flex-start;">
                <span>Яскравість демонстрації:</span>
                <input type="range" min="0" max="100" value="70">
            </div>

            <div class="row">
                <input type="text" placeholder="Введи щось для тесту...">
            </div>
        </div>
        
        <p style="text-align: center; color: #999; font-size: 0.8rem;">Максиме, додай цей сайт на Home Screen!</p>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const imgEl = document.getElementById('main-img');
        const imgHolder = document.getElementById('img-holder');

        // Логіка перевірки мережі
        function updateOnlineStatus() {
            if (navigator.onLine) {
                statusEl.textContent = "Ви онлайн";
                statusEl.className = "status-bar online";
            } else {
                statusEl.textContent = "Ви офлайн";
                statusEl.className = "status-bar offline";
                // Якщо картинка не встигла завантажитись
                if (!imgEl.complete || imgEl.naturalWidth === 0) {
                    imgHolder.innerHTML = '<div class="no-internet">Немає інету ☹️</div>';
                }
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        imgEl.onerror = () => {
            imgHolder.innerHTML = '<div class="no-internet">Немає інету ☹️</div>';
        };
        updateOnlineStatus();

        // Створення Service Worker "на льоту" через Blob
        const swCode = `
            const CACHE_NAME = 'offline-v1';
            const ASSETS = [window.location.href];

            self.addEventListener('install', (e) => {
                self.skipWaiting();
            });

            self.addEventListener('fetch', (e) => {
                e.respondWith(
                    fetch(e.request).catch(() => caches.match(e.request) || new Response("Офлайн-режим активовано"))
                );
            });
        `;

        if ('serviceWorker' in navigator) {
            // Реєструємо порожній SW для активації PWA можливостей
            // Для повноцінного кешування в одному файлі ми використовуємо "inline" підхід
            const blob = new Blob([`
                self.addEventListener('fetch', function(event) {
                    event.respondWith(
                        fetch(event.request).catch(function() {
                            return caches.match(event.request);
                        })
                    );
                });
            `], { type: 'text/javascript' });
            
            navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' });
        }
    </script>
</body>
</html>

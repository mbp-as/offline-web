<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Von PWA</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Von PWA","short_name":"Von","start_url":".","display":"standalone","background_color":"#F4F7F6","theme_color":"#73FBB3","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/25/25231.png","sizes":"512x512","type":"image/png"}]}'>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #F4F7F6;
            --online-color: #73FBB3;
            --offline-color: #FF6B6B;
            --card-bg: #FFFFFF;
            --text-secondary: #BDBDBD;
            --accent-blue: #007AFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            overflow-x: hidden;
        }

        /* Верхній бар */
        .status-bar {
            width: 100%;
            height: 100px;
            background-color: var(--online-color);
            border-bottom-left-radius: 65px;
            border-bottom-right-radius: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 100;
            transition: background-color 0.3s;
        }

        .status-text { font-size: 20px; font-weight: 700; }
        .status-bar.offline { background-color: var(--offline-color); }

        /* Контент */
        .content-container {
            width: 100%;
            max-width: 400px;
            margin-top: 130px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .von-card {
            background-color: var(--card-bg);
            width: 100%;
            border-radius: 26px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .von-image { width: 100%; height: auto; display: block; }

        .action-bar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .action-btn { background: none; border: none; cursor: pointer; width: 24px; height: 24px; padding: 0; }
        .action-icon { width: 100%; height: 100%; }

        /* Версія */
        .app-version {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: calc(20px + env(safe-area-inset-bottom));
            font-weight: 300;
        }

        /* Попап оновлення (iOS Style) */
        #update-popup {
            position: fixed;
            bottom: -100px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #update-popup.show {
            bottom: calc(30px + env(safe-area-inset-bottom));
        }

        .update-text { font-size: 15px; font-weight: 500; color: #000; }
        .update-btn { 
            color: var(--accent-blue); 
            font-weight: 600; 
            text-decoration: none; 
            background: none; 
            border: none; 
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status-bar" class="status-bar">
        <span id="status-text" class="status-text">Онлайн</span>
    </div>

    <div class="content-container">
        <div class="von-card">
            <img src="von.webp" alt="Von" class="von-image">
            <div class="action-bar">
                <button class="action-btn"><img src="like.svg" class="action-icon"></button>
                <button class="action-btn" id="share-btn"><img src="share.svg" class="action-icon"></button>
            </div>
        </div>
    </div>

    <div class="app-version">app ver: 0.0.2</div>

    <div id="update-popup">
        <span class="update-text">Доступна нова версія</span>
        <button class="update-btn" onclick="window.location.reload()">Оновити</button>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const statusText = document.getElementById('status-text');
        const shareBtn = document.getElementById('share-btn');
        const updatePopup = document.getElementById('update-popup');

        // 1. Статус мережі
        function updateStatus() {
            if (navigator.onLine) {
                statusText.textContent = "Онлайн";
                statusBar.classList.remove('offline');
            } else {
                statusText.textContent = "Офлайн";
                statusBar.classList.add('offline');
            }
        }
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        // 2. Поділитися
        shareBtn.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Von PWA',
                        url: window.location.href
                    });
                } catch (e) { console.error(e); }
            }
        });

        // 3. Service Worker та Динамічне Оновлення
        if ('serviceWorker' in navigator) {
            // Створюємо воркер з унікальним ID для кожної версії
            const swCode = `
                const CACHE_NAME = 'von-cache-v0.0.2';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl).then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Показуємо наш кастомний попап
                            updatePopup.classList.add('show');
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
